<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .content {
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- 侧边栏 -->
        <div class="col-md-3 sidebar">
            <div class="p-4">
                <h3>学生中心</h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active p-3" href="/student/index">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/student/apply">申请创新学分</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/student/applications">申请记录</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/login">退出登录</a>
                </li>
            </ul>
        </div>

        <!-- 主内容区 -->
        <div class="col-md-9 content">
            <div class="mb-4">
                <h2>学生中心</h2>
            </div>

            <!-- 个人信息卡片 -->
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">个人信息</h5>
                    <div class="row">
                        <div class="col-md-6">
                            <p class="card-text"><strong>学号：</strong><span th:text="${student.studentId}"></span></p>
                            <p class="card-text"><strong>姓名：</strong><span th:text="${student.name}"></span></p>
                            <p class="card-text"><strong>性别：</strong><span th:text="${student.gender}"></span></p>
                        </div>
                        <div class="col-md-6">
                            <p class="card-text"><strong>年级：</strong><span th:text="${student.grade}"></span></p>
                            <p class="card-text"><strong>专业：</strong><span th:text="${student.majorName}"></span></p>
                            <p class="card-text"><strong>班级：</strong><span th:text="${student.className}"></span></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 学分统计卡片 -->
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">学分统计</h5>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="card text-center">
                                <div class="card-body">
                                    <h6 class="card-subtitle mb-2 text-muted">当前总学分</h6>
                                    <p class="card-text display-4"><span th:text="${totalCredit}"></span></p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-center">
                                <div class="card-body">
                                    <h6 class="card-subtitle mb-2 text-muted">待审核申请</h6>
                                    <p class="card-text display-4"><span th:text="${pendingCount}"></span></p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-center">
                                <div class="card-body">
                                    <h6 class="card-subtitle mb-2 text-muted">总申请次数</h6>
                                    <p class="card-text display-4"><span th:text="${totalApplications}"></span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
