<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>申请记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .content {
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
        .status-pending {
            color: #ffc107;
        }
        .status-approved {
            color: #28a745;
        }
        .status-rejected {
            color: #dc3545;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- 侧边栏 -->
        <div class="col-md-3 sidebar">
            <div class="p-4">
                <h3>学生中心</h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link p-3" href="/student/index">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/student/apply">申请创新学分</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active p-3" href="/student/applications">申请记录</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/login">退出登录</a>
                </li>
            </ul>
        </div>

        <!-- 主内容区 -->
        <div class="col-md-9 content">
            <div class="mb-4">
                <h2>申请记录</h2>
            </div>

            <!-- 成功信息 -->
            <div th:if="${success != null}" class="alert alert-success">
                <span th:text="${success}"></span>
            </div>

            <!-- 申请记录列表 -->
            <div class="card">
                <div class="card-body">
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>申请编号</th>
                            <th>学分类别</th>
                            <th>申请日期</th>
                            <th>状态</th>
                            <th>学分值</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="application : ${applications}">
                            <td th:text="${application.applicationId}"></td>
                            <td th:text="${application.categoryName}"></td>
                            <td th:text="${application.applyDate}"></td>
                            <td>
                                        <span th:class="${application.status == '未审核' ? 'status-pending' : application.status == '审核通过' ? 'status-approved' : 'status-rejected'}">
                                            <span th:text="${application.status}"></span>
                                        </span>
                            </td>
                            <td th:text="${application.creditValue}"></td>
                        </tr>
                        </tbody>
                    </table>

                    <!-- 空记录提示 -->
                    <div th:if="${applications == null or applications.size() == 0}" class="text-center py-4">
                        <p class="text-muted">暂无申请记录</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
