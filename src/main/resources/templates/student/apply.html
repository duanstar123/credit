<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>申请创新学分</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .content {
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- 侧边栏 -->
        <div class="col-md-3 sidebar">
            <div class="p-4">
                <h3>学生中心</h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link p-3" href="/student/index">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active p-3" href="/student/apply">申请创新学分</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/student/applications">申请记录</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/login">退出登录</a>
                </li>
            </ul>
        </div>

        <!-- 主内容区 -->
        <div class="col-md-9 content">
            <div class="mb-4">
                <h2>申请创新学分</h2>
            </div>

            <!-- 错误信息 -->
            <div th:if="${error != null}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <!-- 成功信息 -->
            <div th:if="${success != null}" class="alert alert-success">
                <span th:text="${success}"></span>
            </div>

            <!-- 申请表单 -->
            <div class="card">
                <div class="card-body">
                    <form action="/student/apply" method="post" enctype="multipart/form-data">
                        <div class="form-group">
                            <label for="categoryId" class="form-label">学分类别</label>
                            <select class="form-control" id="categoryId" name="categoryId" required>
                                <option value="">请选择学分类别</option>
                                <option th:each="category : ${categories}" th:value="${category.categoryId}" th:text="${category.categoryName + ' (' + category.creditValue + '学分)'}"</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="applicationReason" class="form-label">申请事由</label>
                            <textarea class="form-control" id="applicationReason" name="applicationReason" rows="4" required placeholder="请详细描述申请理由"></textarea>
                        </div>

                        <div class="form-group">
                            <label for="screenshot" class="form-label">作品截图</label>
                            <input type="file" class="form-control" id="screenshot" name="screenshot">
                            <small class="form-text text-muted">请上传一张作品截图</small>
                        </div>

                        <div class="form-group">
                            <label for="certificate" class="form-label">证书图片</label>
                            <input type="file" class="form-control" id="certificate" name="certificate">
                            <small class="form-text text-muted">请上传一张证书图片</small>
                        </div>

                        <div class="form-group">
                            <label for="sourceCode" class="form-label">源代码压缩包</label>
                            <input type="file" class="form-control" id="sourceCode" name="sourceCode">
                            <small class="form-text text-muted">请上传一个源代码压缩包</small>
                        </div>

                        <input type="hidden" name="studentId" th:value="${student.studentId}">

                        <button type="submit" class="btn btn-primary">提交申请</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
