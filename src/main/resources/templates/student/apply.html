<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>申请创新学分</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .content {
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
    </style>
    <script>
        // 页面加载完成后初始化
        window.onload = function() {
            // 初始化学分值
            updateCreditValue();
            // 打印学分类别映射，用于调试
            console.log("学分类别映射:", categoryCreditMap);
        };

        // 学分类别对应的学分值
        var categoryCreditMap = {
            <th:each="category : ${categories ?: #lists.emptyList()}">
                "[[${category?.categoryId}]]": [[${category?.creditValue}]]<th:if="!${loop.last}">,</th:if>
            </th:each>
        };

        function updateCreditValue() {
            var categoryId = document.getElementById('categoryId').value;
            var creditValueInput = document.getElementById('creditValue');

            console.log("选择的学分类别ID:", categoryId);
            console.log("对应的学分值:", categoryCreditMap[categoryId]);

            if (categoryId && categoryCreditMap[categoryId]) {
                var creditValue = categoryCreditMap[categoryId];
                creditValueInput.value = creditValue;
                console.log("学分值更新为：" + creditValue);
            } else {
                creditValueInput.value = '';
                console.log("未选择学分类别或学分值不存在，学分值为空");
            }
        }
    </script>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- 侧边栏 -->
        <div class="col-md-3 sidebar">
            <div class="p-4">
                <h3>学生中心</h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link p-3" href="/student/index">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active p-3" href="/student/apply">申请创新学分</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/student/applications">申请记录</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/login">退出登录</a>
                </li>
            </ul>
        </div>
        <!-- 内容区域 -->
        <div class="col-md-9 content">
            <h2>申请创新学分</h2>
            <div class="card">
                <div class="card-body">
                    <!-- 成功信息 -->
                    <div th:if="${success != null}" class="alert alert-success">
                        <span th:text="${success}"></span>
                    </div>

                    <!-- 错误信息 -->
                    <div th:if="${error != null}" class="alert alert-danger">
                        <span th:text="${error}"></span>
                    </div>

                    <!-- 申请表单 -->
                    <form action="/student/apply" method="post">
                        <div class="form-group">
                            <label for="categoryId" class="form-label">学分类别</label>
                            <select class="form-control" id="categoryId" name="categoryId" required onchange="updateCreditValue()">
                                <option value="">请选择学分类别</option>
                                <option th:each="category : ${categories ?: #lists.emptyList()}"
                                        th:value="${category?.categoryId}"
                                        th:text="${category?.categoryName + ' (' + category?.creditValue + '学分)'}"></option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="applicationReason" class="form-label">申请事由</label>
                            <textarea class="form-control" id="applicationReason" name="applicationReason" rows="4" required placeholder="请详细描述申请理由"></textarea>
                        </div>

                        <input type="hidden" id="creditValue" name="creditValue" required>

                        <button type="submit" class="btn btn-primary">提交申请</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
