<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学分类别管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .content {
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
        .status-active {
            color: #28a745;
        }
        .status-inactive {
            color: #dc3545;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- 侧边栏 -->
        <div class="col-md-3 sidebar">
            <div class="p-4">
                <h3>教师中心</h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/index">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/students">学生管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/classes">班级管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active p-3" href="/teacher/categories">学分类别管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/applications">学分申请审核</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/login">退出登录</a>
                </li>
            </ul>
        </div>

        <!-- 主内容区 -->
        <div class="col-md-9 content">
            <div class="mb-4">
                <h2>学分类别管理</h2>
                <a href="/category/create" class="btn btn-primary">新建学分类别</a>
            </div>

            <!-- 成功信息 -->
            <div th:if="${success != null}" class="alert alert-success">
                <span th:text="${success}"></span>
            </div>

            <!-- 错误信息 -->
            <div th:if="${error != null}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <!-- 学分类别列表 -->
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">学分类别列表</h5>
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>类别ID</th>
                            <th>类别名称</th>
                            <th>学分值</th>
                            <th>新增日期</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="category : ${categories}">
                            <td th:text="${category.categoryId}"></td>
                            <td th:text="${category.categoryName}"></td>
                            <td th:text="${category.creditValue}"></td>
                            <td th:text="${category.createDate}"></td>
                            <td>
                                        <span th:class="${category.status == 1 ? 'status-active' : 'status-inactive'}">
                                            <span th:text="${category.status == 1 ? '启用' : '禁用'}"></span>
                                        </span>
                            </td>
                            <td>
                                <a th:href="@{/category/edit(categoryId=${category.categoryId})}" class="btn btn-sm btn-outline-primary">编辑</a>
                                <a th:href="@{/category/status(categoryId=${category.categoryId}, status=${category.status == 1 ? 0 : 1})}"
                                   class="btn btn-sm" th:classappend="${category.status == 1 ? 'btn-outline-danger' : 'btn-outline-success'}">
                                    <span th:text="${category.status == 1 ? '禁用' : '启用'}"></span>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <!-- 空记录提示 -->
                    <div th:if="${categories == null or categories.size() == 0}" class="text-center py-4">
                        <p class="text-muted">暂无学分类别记录</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
