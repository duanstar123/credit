<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>申请详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .content {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .file-link {
            color: #007bff;
            text-decoration: none;
        }
        .file-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="content">
    <div class="mb-4">
        <h2>申请详情</h2>
        <a href="/teacher/applications" class="btn btn-secondary">返回</a>
    </div>

    <!-- 错误信息 -->
    <div th:if="${error != null}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <!-- 申请信息 -->
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">申请信息</h5>
            <div class="row">
                <div class="col-md-6">
                    <p><strong>申请编号：</strong><span th:text="${application.applicationId}"></span></p>
                    <p><strong>学生学号：</strong><span th:text="${application.studentId}"></span></p>
                    <p><strong>学分类别：</strong><span th:text="${application.categoryName}"></span></p>
                    <p><strong>申请日期：</strong><span th:text="${application.applyDate}"></span></p>
                </div>
                <div class="col-md-6">
                    <p><strong>学生姓名：</strong><span th:text="${application.studentName}"></span></p>
                    <p><strong>学分值：</strong><span th:text="${application.creditValue}"></span></p>
                    <p><strong>当前状态：</strong><span th:text="${application.status}"></span></p>
                </div>
            </div>

            <div class="mt-4">
                <p><strong>申请事由：</strong></p>
                <p th:text="${application.applicationReason}"></p>
            </div>

            <div class="mt-4">
                <p><strong>附件：</strong></p>
                <div th:if="${application.screenshotUrl != null}">
                    <p>作品截图：<a href="#" class="file-link" th:href="${application.screenshotUrl}">查看</a></p>
                </div>
                <div th:if="${application.certificateUrl != null}">
                    <p>证书图片：<a href="#" class="file-link" th:href="${application.certificateUrl}">查看</a></p>
                </div>
                <div th:if="${application.sourceCodeUrl != null}">
                    <p>源代码：<a href="#" class="file-link" th:href="${application.sourceCodeUrl}">下载</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- 审核表单 -->
    <div class="card">
        <div class="card-body">
            <h5 class="card-title">审核</h5>
            <form action="/teacher/applications/review" method="post">
                <input type="hidden" name="applicationId" th:value="${application.applicationId}">

                <div class="form-group">
                    <label class="form-label">审核结果</label>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="status" id="approved" value="审核通过" checked>
                        <label class="form-check-label" for="approved">审核通过</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="status" id="rejected" value="审核未通过">
                        <label class="form-check-label" for="rejected">审核未通过</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="reviewNote" class="form-label">审核意见</label>
                    <textarea class="form-control" id="reviewNote" name="reviewNote" rows="3" placeholder="请输入审核意见"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">提交审核</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
