<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学分申请审核</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .content {
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- 侧边栏 -->
        <div class="col-md-3 sidebar">
            <div class="p-4">
                <h3>教师中心</h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/index">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/students">学生管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/classes">班级管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/categories">学分类别管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active p-3" href="/teacher/applications">学分申请审核</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/login">退出登录</a>
                </li>
            </ul>
        </div>

        <!-- 主内容区 -->
        <div class="col-md-9 content">
            <div class="mb-4">
                <h2>学分申请审核</h2>
            </div>

            <!-- 成功信息 -->
            <div th:if="${success != null}" class="alert alert-success">
                <span th:text="${success}"></span>
            </div>

            <!-- 错误信息 -->
            <div th:if="${error != null}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <!-- 申请列表 -->
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">待审核申请</h5>
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>申请编号</th>
                            <th>学生学号</th>
                            <th>学生姓名</th>
                            <th>学分类别</th>
                            <th>申请日期</th>
                            <th>操作</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="application : ${applications}">
                            <td th:text="${application.applicationId}"></td>
                            <td th:text="${application.studentId}"></td>
                            <td th:text="${application.studentName}"></td>
                            <td th:text="${application.categoryName}"></td>
                            <td th:text="${application.applyDate}"></td>
                            <td>
                                <a th:href="@{/credit/detail(applicationId=${application.applicationId})}" class="btn btn-sm btn-outline-primary">查看</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>

                    <!-- 空记录提示 -->
                    <div th:if="${applications == null or applications.size() == 0}" class="text-center py-4">
                        <p class="text-muted">暂无待审核申请</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
