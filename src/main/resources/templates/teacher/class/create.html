<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>创建班级</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .content {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="content">
    <div class="mb-4">
        <h2>创建班级</h2>
        <a href="/teacher/classes" class="btn btn-secondary">返回</a>
    </div>

    <!-- 错误信息 -->
    <div th:if="${error != null}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <!-- 创建表单 -->
    <div class="card">
        <div class="card-body">
            <form action="/class/create" method="post">
                <div class="form-group">
                    <label for="classId" class="form-label">班级ID</label>
                    <input type="text" class="form-control" id="classId" name="classId" required placeholder="请输入班级ID">
                </div>

                <div class="form-group">
                    <label for="className" class="form-label">班级名称</label>
                    <input type="text" class="form-control" id="className" name="className" required placeholder="请输入班级名称">
                </div>

                <div class="form-group">
                    <label for="grade" class="form-label">年级</label>
                    <input type="text" class="form-control" id="grade" name="grade" required placeholder="如：2020级">
                </div>

                <div class="form-group">
                    <label for="majorId" class="form-label">专业ID</label>
                    <input type="text" class="form-control" id="majorId" name="majorId" required placeholder="请输入专业ID">
                </div>

                <div class="form-group">
                    <label for="collegeId" class="form-label">院系ID</label>
                    <input type="text" class="form-control" id="collegeId" name="collegeId" required placeholder="请输入院系ID">
                </div>

                <div class="form-group">
                    <label for="remark" class="form-label">备注</label>
                    <textarea class="form-control" id="remark" name="remark" rows="3" placeholder="请输入备注信息"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">创建</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
