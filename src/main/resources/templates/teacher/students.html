<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .content {
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- 侧边栏 -->
        <div class="col-md-3 sidebar">
            <div class="p-4">
                <h3>教师中心</h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/index">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active p-3" href="/teacher/students">学生管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/classes">班级管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/categories">学分类别管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/applications">学分申请审核</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/login">退出登录</a>
                </li>
            </ul>
        </div>

        <!-- 主内容区 -->
        <div class="col-md-9 content">
            <div class="mb-4">
                <h2>学生管理</h2>
            </div>

            <!-- 成功信息 -->
            <div th:if="${success != null}" class="alert alert-success">
                <span th:text="${success}"></span>
            </div>

            <!-- 错误信息 -->
            <div th:if="${error != null}" class="alert alert-danger">
                <span th:text="${error}"></span>
            </div>

            <!-- 导入学生 -->
            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title">导入学生</h5>
                    <form action="/teacher/students/import" method="post" enctype="multipart/form-data">
                        <div class="form-group">
                            <label for="file" class="form-label">Excel文件</label>
                            <input type="file" class="form-control" id="file" name="file" accept=".xlsx, .xls" required>
                            <small class="form-text text-muted">请上传包含学生信息的Excel文件</small>
                        </div>
                        <button type="submit" class="btn btn-primary">导入</button>
                    </form>
                </div>
            </div>

            <!-- 学生列表 -->
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">学生列表</h5>
                    <table class="table table-striped">
                        <thead>
                        <tr>
                            <th>学号</th>
                            <th>姓名</th>
                            <th>性别</th>
                            <th>年级</th>
                            <th>班级</th>
                            <th>专业</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="student : ${students}">
                            <td th:text="${student.studentId}"></td>
                            <td th:text="${student.name}"></td>
                            <td th:text="${student.gender}"></td>
                            <td th:text="${student.grade}"></td>
                            <td th:text="${student.classId}"></td>
                            <td th:text="${student.majorId}"></td>
                        </tr>
                        </tbody>
                    </table>

                    <!-- 空记录提示 -->
                    <div th:if="${students == null or students.size() == 0}" class="text-center py-4">
                        <p class="text-muted">暂无学生记录</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
