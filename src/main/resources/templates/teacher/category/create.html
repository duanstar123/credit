<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>创建学分类别</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .content {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
<div class="content">
    <div class="mb-4">
        <h2>创建学分类别</h2>
        <a href="/teacher/categories" class="btn btn-secondary">返回</a>
    </div>

    <!-- 错误信息 -->
    <div th:if="${error != null}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <!-- 创建表单 -->
    <div class="card">
        <div class="card-body">
            <form action="/category/create" method="post">
                <div class="form-group">
                    <label for="categoryId" class="form-label">类别ID</label>
                    <input type="text" class="form-control" id="categoryId" name="categoryId" required placeholder="请输入类别ID">
                </div>

                <div class="form-group">
                    <label for="categoryName" class="form-label">类别名称</label>
                    <input type="text" class="form-control" id="categoryName" name="categoryName" required placeholder="请输入类别名称">
                </div>

                <div class="form-group">
                    <label for="creditValue" class="form-label">学分值</label>
                    <input type="number" step="0.1" class="form-control" id="creditValue" name="creditValue" required placeholder="请输入学分值">
                </div>

                <div class="form-group">
                    <label for="remark" class="form-label">备注</label>
                    <textarea class="form-control" id="remark" name="remark" rows="3" placeholder="请输入备注信息"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">创建</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
