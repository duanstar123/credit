<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>教师中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .sidebar {
            height: 100vh;
            background-color: #343a40;
            color: white;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
        }
        .sidebar a:hover {
            background-color: #495057;
        }
        .content {
            padding: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
        .stat-card {
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- 侧边栏 -->
        <div class="col-md-3 sidebar">
            <div class="p-4">
                <h3>教师中心</h3>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link active p-3" href="/teacher/index">首页</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/students">学生管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/classes">班级管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/categories">学分类别管理</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/teacher/applications">学分申请审核</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link p-3" href="/login">退出登录</a>
                </li>
            </ul>
        </div>

        <!-- 主内容区 -->
        <div class="col-md-9 content">
            <div class="mb-4">
                <h2>教师中心</h2>
                <p>欢迎您，<span th:text="${teacher.realName}"></span> 老师</p>
            </div>

            <!-- 统计卡片 -->
            <div class="row">
                <div class="col-md-4">
                    <div class="card stat-card bg-primary text-white">
                        <div class="card-body text-center">
                            <h5 class="card-title">待审核申请</h5>
                            <p class="card-text display-4"><span th:text="${pendingCount}"></span></p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card bg-success text-white">
                        <div class="card-body text-center">
                            <h5 class="card-title">学生总数</h5>
                            <p class="card-text display-4"><span th:text="${totalStudents}"></span></p>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card stat-card bg-info text-white">
                        <div class="card-body text-center">
                            <h5 class="card-title">班级总数</h5>
                            <p class="card-text display-4"><span th:text="${totalClasses}"></span></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 快速操作 -->
            <div class="card mt-4">
                <div class="card-body">
                    <h5 class="card-title">快速操作</h5>
                    <div class="row">
                        <div class="col-md-3">
                            <a href="/teacher/students" class="btn btn-outline-primary w-100">学生管理</a>
                        </div>
                        <div class="col-md-3">
                            <a href="/teacher/classes" class="btn btn-outline-primary w-100">班级管理</a>
                        </div>
                        <div class="col-md-3">
                            <a href="/teacher/categories" class="btn btn-outline-primary w-100">学分类别管理</a>
                        </div>
                        <div class="col-md-3">
                            <a href="/teacher/applications" class="btn btn-outline-primary w-100">学分申请审核</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
